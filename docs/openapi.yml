openapi: 3.0.3
info:
  title: High-Throughput Notification API
  description: Core ingress and management API for the distributed notification engine.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Relative to this server (works with Swagger Try it out, Docker port mapping, and reverse proxies)

paths:
  /ws:
    get:
      summary: WebSocket stream for real-time notification status updates
      description: |
        Upgrade to WebSocket. Each text message is JSON with fields `id`, `status`, and optional `detail`
        (see `StatusWebSocketMessage`). Connect with optional query `watch=<notification-uuid>` to receive only
        events for that notification. Configure `WEBSOCKET_ALLOWED_ORIGINS` on the API (comma-separated list, or `*`)
        to restrict browser `Origin` headers; if unset, all origins are allowed (development default).
      parameters:
        - name: watch
          in: query
          required: false
          description: When set, only updates for this notification id are delivered on this connection.
          schema:
            type: string
            format: uuid
      responses:
        '101':
          description: Switching Protocols (WebSocket)
        '400':
          description: Invalid watch query parameter

  /notifications:
    get:
      summary: List notifications with optional filters and pagination
      operationId: listNotifications
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, SENT, FAILED, CANCELLED]
        - name: channel
          in: query
          required: false
          schema:
            type: string
            enum: [SMS, EMAIL, PUSH]
        - name: created_from
          in: query
          required: false
          description: Inclusive lower bound on created_at (RFC3339 or RFC3339Nano)
          schema:
            type: string
            format: date-time
        - name: created_to
          in: query
          required: false
          description: Inclusive upper bound on created_at (RFC3339 or RFC3339Nano)
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: Page size (default 50, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          description: Number of rows to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '400':
          description: Invalid query parameters
    post:
      summary: Submit a single notification for async processing
      operationId: createNotification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        '202':
          description: Notification accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  notification_id:
                    type: string
                    format: uuid
                  send_at:
                    type: string
                    format: date-time
                    description: Effective send_at stored for this notification
        '400':
          description: Invalid payload schema

  /notifications/batch:
    post:
      summary: Submit a batch of notifications for async processing
      operationId: submitBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchSubmitRequest'
      responses:
        '202':
          description: Batch accepted for processing
        '400':
          description: Invalid payload schema

  /notifications/batch/{batch_id}:
    get:
      summary: List notification statuses for an ingress batch
      operationId: getBatchNotificationStatus
      parameters:
        - name: batch_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch id, count, and full notification records (empty notifications when no rows match)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatusResponse'
        '400':
          description: Invalid batch ID format

  /notifications/{id}:
    get:
      summary: Retrieve the status of a specific notification
      operationId: getNotificationStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '404':
          description: Notification not found
          
    delete:
      summary: Cancel a pending notification
      operationId: cancelNotification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification successfully cancelled
        '404':
          description: Notification not found
        '409':
          description: Conflict (Notification already sent or failed)

components:
  schemas:
    StatusWebSocketMessage:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, SENT, FAILED, CANCELLED]
        detail:
          type: string
          description: Optional machine-readable sub-state (e.g. rate_limited, retry_scheduled, idempotency_unavailable).

    CreateRequest:
      type: object
      required:
        - idempotency_key
        - recipient
        - channel
        - payload
      properties:
        idempotency_key:
          type: string
          example: "req-single-123"
        recipient:
          type: string
          example: "+15551234567"
        channel:
          type: string
          enum: [SMS, EMAIL, PUSH]
        priority:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        send_at:
          type: string
          format: date-time
          description: >
            Optional RFC3339/RFC3339Nano time when the notification becomes eligible for delivery.
            Omitted or null means immediate. Future values are not published to the broker until then (sweeper).
        payload:
          type: object
          additionalProperties: true

    BatchSubmitRequest:
      type: object
      required:
        - idempotency_key
        - notifications
      properties:
        idempotency_key:
          type: string
          example: "req-batch-123"
        notifications:
          type: array
          maxItems: 1000
          items:
            type: object
            required:
              - recipient
              - channel
              - payload
            properties:
              recipient:
                type: string
              channel:
                type: string
                enum: [SMS, EMAIL, PUSH]
              priority:
                type: integer
              send_at:
                type: string
                format: date-time
                description: Optional per-row schedule (RFC3339); same semantics as single create send_at.
              payload:
                type: object
                additionalProperties: true

    BatchStatusResponse:
      type: object
      required:
        - batch_id
        - count
        - notifications
      properties:
        batch_id:
          type: string
          format: uuid
        count:
          type: integer
          minimum: 0
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        recipient:
          type: string
        channel:
          type: string
        status:
          type: string
          enum: [PENDING, SENT, FAILED, CANCELLED]
        retry_count:
          type: integer
        last_error:
          type: string
          nullable: true
        send_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    NotificationListResponse:
      type: object
      required:
        - notifications
        - total
        - limit
        - offset
      properties:
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
        offset:
          type: integer