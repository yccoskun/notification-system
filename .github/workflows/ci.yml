name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.3'
        cache: true

    - name: Verify formatting
      run: test -z "$(gofmt -s -l .)"

    - name: Go vet
      run: go vet ./...

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      timeout-minutes: 15
      with:
        version: 'v1.64.8'
        install-mode: goinstall

    - name: Run Unit & Integration Tests (Testcontainers)
      run: make test

    - name: Verify Builds
      run: make build
