name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.3'
        cache: true

    - name: Install Dependencies
      run: go mod download

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: 'v1.64.8'
        install-mode: goinstall

    - name: Run Unit & Integration Tests (Testcontainers)
      run: make test
      
    - name: Verify Builds
      run: |
        CGO_ENABLED=0 GOOS=linux go build -o bin/api ./cmd/api/main.go
        CGO_ENABLED=0 GOOS=linux go build -o bin/worker ./cmd/worker/main.go
        CGO_ENABLED=0 GOOS=linux go build -o bin/sweeper ./cmd/sweeper/main.go