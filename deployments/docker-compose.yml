networks:
  notification_net:
    driver: bridge
    name: notification_net

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:

services:
  # 1. Database
  postgres:
    image: postgres:16-alpine
    container_name: notification_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: notification_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d 
    networks:
      - notification_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: notification_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secretpassword
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - notification_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Coordinator / PubSub
  redis:
    image: redis:7.2-alpine
    container_name: notification_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - notification_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 4. Metrics Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: notification_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - notification_net

  # 5. Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: notification_jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger Web UI
      - "4317:4317"   # OTLP gRPC receiver (for Go OpenTelemetry)
      - "4318:4318"   # OTLP HTTP receiver
    networks:
      - notification_net