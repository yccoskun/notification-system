global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'notification-api'
    static_configs:
      - targets: ['api:8080'] # Will map to Dockerized Go API

  - job_name: 'notification-worker'
    static_configs:
      - targets: ['worker:8081'] # Will map to Dockerized Go Worker